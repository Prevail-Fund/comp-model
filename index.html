<head>
<meta charset="UTF-8">

<title>Prevail Fund — Protected</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700&display=swap');
  body{margin:0;font-family:'Figtree',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#fff;color:#3c4043;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .box{max-width:400px;width:100%;padding:32px;border:1px solid #e6e8ea;border-radius:14px;margin:20px}
  .brand{font-size:17px;font-weight:600;margin-bottom:18px}
  .brand span{border-bottom:3px solid #ff9797;padding-bottom:2px}

  p{font-size:13px;color:#73787e;margin:0 0 18px;line-height:1.5}

  input[type=password]:focus{outline:2px solid #ffecec;border-color:#ff9797}
  .rem{display:flex;align-items:center;gap:8px;font-size:13px;color:#73787e;margin:4px 0 16px}
  button{width:100%;padding:11px;font-size:15px;font-weight:600;color:#fff;background:#3c4043;border:none;border-radius:8px;cursor:pointer;font-family:inherit}
  button:hover{opacity:.88}
  .err{color:#c0392b;font-size:13px;margin-top:10px;min-height:16px}
</style>
</head>

  </form>
</div>

const STORE_KEY="prevail_comp_unlock";
const ub = s => Uint8Array.from(atob(s), c=>c.charCodeAt(0));
const b64 = a => btoa(String.fromCharCode(...new Uint8Array(a)));
const salt = ub(SALT_B64), iv = ub(IV_B64), ct = ub(CT_B64);

async function deriveKey(pw){
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2", salt, iterations:600000, hash:"SHA-256"}, km,
    {name:"AES-GCM", length:256}, true, ["decrypt"]);
}
async function decryptWith(key){
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv}, key, ct); // throws if wrong key
  return new TextDecoder().decode(pt);
}
function show(html){ document.open(); document.write(html); document.close(); }
async function remember(key){
  try{
    const raw = await crypto.subtle.exportKey("raw", key);
    localStorage.setItem(STORE_KEY, JSON.stringify({k:b64(raw), exp:Date.now()+30*24*3600*1000}));
  }catch(e){}
}
// Auto-unlock if remembered — must wait for the page to finish parsing, otherwise
// document.write() appends alongside the lock screen instead of replacing it.
const autoUnlock = async ()=>{
  try{
    const s = JSON.parse(localStorage.getItem(STORE_KEY) || "null");
    if(s && s.exp > Date.now()){
      const key = await crypto.subtle.importKey("raw", ub(s.k), "AES-GCM", false, ["decrypt"]);
      show(await decryptWith(key));
    } else if(s){ localStorage.removeItem(STORE_KEY); }
  }catch(e){ localStorage.removeItem(STORE_KEY); }
};
if(document.readyState === "loading") document.addEventListener("DOMContentLoaded", autoUnlock);
else autoUnlock();

document.getElementById("f").addEventListener("submit", async ev=>{
  ev.preventDefault();
  const btn = document.getElementById("btn"), err = document.getElementById("err");
  btn.textContent = "Unlocking…"; btn.disabled = true; err.textContent = "";
  try{
    const key = await deriveKey(document.getElementById("pw").value);
    const html = await decryptWith(key);
    if(document.getElementById("rem").checked) await remember(key);
    show(html);
  }catch(e){
    err.textContent = "That password isn't right — try again.";
    btn.textContent = "Unlock"; btn.disabled = false;
  }
});
</script>
